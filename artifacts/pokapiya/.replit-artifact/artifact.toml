kind = "web"
previewPath = "/"
title = "Pokapiya 3D"
version = "1.0.0"
id = "artifacts/pokapiya"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26114

[services.development]
run = "pnpm --filter @workspace/pokapiya run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pokapiya", "run", "build" ]
publicDir = "artifacts/pokapiya/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26114"
BASE_PATH = "/"
