name: Deploy preview to gh-pages branch

# Builds the Vite app on every push and force-pushes the dist/ output to a
# `gh-pages` branch. After the first successful run, enable serving from
# that branch under Settings -> Pages -> Source: "Deploy from a branch" ->
# Branch: gh-pages -> /(root). The site will then be live at
# https://<user>.github.io/Pokedely/.

on:
  push:
    branches: [main, "claude/**"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          single-commit: true
